<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>try</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1a1a2e;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
        }

        #msg {
            font-size: 2rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <p id="msg">Clicca qui per iniziare</p>

    <script>
        function goFullscreen() {
            const elem = document.documentElement;
            
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => {
                    console.log('Errore fullscreen:', err);
                });
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            }
            
            document.getElementById('msg').textContent = 'Fullscreen attivo!';
        }

        // Click
        document.body.addEventListener('click', goFullscreen);
        
        // Movimento mouse
        document.body.addEventListener('mousemove', goFullscreen, { once: true });
        
        // Tastiera
        document.addEventListener('keydown', goFullscreen, { once: true });
    </script>

</body>
</html>
