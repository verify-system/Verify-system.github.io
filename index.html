<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - Account Google</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background-color: #fff;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }

        /* BARRA DEL BROWSER */
        .browser-bar {
            width: 100%;
            height: 56px;
            background-color: #f3f3f3;
            border-bottom: 1px solid #dadce0;
            display: flex;
            align-items: center;
            padding: 8px 12px;
            gap: 4px;
        }

        .browser-button {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background-color: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #202124;
            font-size: 16px;
            transition: all 0.2s;
        }

        .browser-button:hover {
            background-color: rgba(0, 0, 0, 0.1);
        }

        .browser-button:active {
            background-color: rgba(0, 0, 0, 0.15);
        }

        .address-bar {
            flex: 1;
            height: 40px;
            background-color: #f0f0f0;
            border: 1px solid #dadce0;
            border-radius: 24px;
            padding: 0 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 0 8px;
        }

        .address-bar input {
            flex: 1;
            border: none;
            outline: none;
            font-size: 14px;
            color: #202124;
            background: transparent;
        }

        .address-bar input::placeholder {
            color: #80868b;
        }

        .address-bar input:focus {
            background-color: white;
        }

        .address-bar:focus-within {
            background-color: white;
            border-color: #dadce0;
            box-shadow: 0 1px 6px rgba(32, 33, 36, 0.08);
        }

        /* MENU DROPDOWN */
        .menu-container {
            position: relative;
        }

        .menu-button {
            width: 32px;
            height: 32px;
        }

        .menu-dropdown {
            position: absolute;
            top: 48px;
            right: 0;
            background-color: white;
            border: 1px solid #dadce0;
            border-radius: 8px;
            min-width: 320px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.15);
            display: none;
            z-index: 1000;
        }

        .menu-dropdown.active {
            display: block;
        }

        .menu-section {
            padding: 8px 0;
            border-bottom: 1px solid #dadce0;
        }

        .menu-section:last-child {
            border-bottom: none;
        }

        .menu-item {
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            color: #202124;
            text-decoration: none;
            font-size: 14px;
            transition: background-color 0.2s;
        }

        .menu-item:hover {
            background-color: #f8f9fa;
        }

        .menu-item i {
            width: 20px;
            text-align: center;
            color: #5f6368;
        }

        /* CONTENT AREA */
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            display: none;
            width: 450px;
            padding: 48px 40px 36px;
            border: 1px solid #dadce0;
            border-radius: 8px;
            text-align: center;
            background-color: white;
        }

        .logo {
            margin-bottom: 16px;
        }

        .logo svg {
            height: 24px;
        }

        h1 {
            font-size: 24px;
            font-weight: 400;
            color: #202124;
            margin-bottom: 8px;
        }

        p {
            font-size: 16px;
            color: #5f6368;
            margin-bottom: 24px;
        }

        .url-display {
            width: 100%;
            padding: 13px 15px;
            border: 1px solid #dadce0;
            border-radius: 4px;
            font-size: 14px;
            color: #5f6368;
            background-color: #f8f9fa;
            margin-bottom: 24px;
            text-align: left;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn {
            display: inline-block;
            width: 100%;
            padding: 10px 24px;
            background-color: #1a73e8;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            transition: background-color 0.2s;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #1765cc;
        }

        .footer {
            margin-top: 26px;
            font-size: 12px;
            color: #5f6368;
        }
    </style>
</head>
<body>

    <!-- BARRA DEL BROWSER -->
    <div class="browser-bar" id="browserBar">
        <button class="browser-button" id="backBtn" title="Indietro">
            <i class="fas fa-arrow-left"></i>
        </button>
        <button class="browser-button" id="forwardBtn" title="Avanti">
            <i class="fas fa-arrow-right"></i>
        </button>
        <button class="browser-button" id="reloadBtn" title="Ricarica">
            <i class="fas fa-redo"></i>
        </button>
        
        <div class="address-bar">
            <input type="text" id="urlInput" value="https://accounts.google.com/signin" readonly>
        </div>
        
        <button class="browser-button" id="starBtn" title="Aggiungi ai segnalibri">
            <i class="far fa-star"></i>
        </button>

        <div class="menu-container">
            <button class="browser-button menu-button" id="menuBtn" title="Menu">
                <i class="fas fa-ellipsis-v"></i>
            </button>
            <div class="menu-dropdown" id="menuDropdown">
                <div class="menu-section">
                    <a class="menu-item" href="#">
                        <i class="fas fa-window-restore"></i>
                        <span>Nuova finestra</span>
                    </a>
                    <a class="menu-item" href="#">
                        <i class="fas fa-user-secret"></i>
                        <span>Nuova finestra anonima</span>
                    </a>
                </div>
                <div class="menu-section">
                    <a class="menu-item" href="#">
                        <i class="fas fa-bookmark"></i>
                        <span>Segnalibri</span>
                    </a>
                    <a class="menu-item" href="#">
                        <i class="fas fa-history"></i>
                        <span>Cronologia</span>
                    </a>
                </div>
                <div class="menu-section">
                    <a class="menu-item" href="#">
                        <i class="fas fa-download"></i>
                        <span>Download</span>
                    </a>
                    <a class="menu-item" href="#">
                        <i class="fas fa-cog"></i>
                        <span>Impostazioni</span>
                    </a>
                </div>
                <div class="menu-section">
                    <a class="menu-item" href="#">
                        <i class="fas fa-question-circle"></i>
                        <span>Guida</span>
                    </a>
                    <a class="menu-item" href="#">
                        <i class="fas fa-info-circle"></i>
                        <span>Informazioni su Chrome</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENUTO PRINCIPALE -->
    <div class="content">
        <div class="container">
            <div class="logo">
                <svg viewBox="0 0 75 24" width="75" height="24" xmlns="http://www.w3.org/2000/svg">
                    <g fill="none" fill-rule="evenodd">
                        <path d="M67.95 9.48h-7.82v2.35h5.6c-.26 3.05-2.8 4.72-5.58 4.72-3.37 0-6.14-2.72-6.14-6.14s2.77-6.14 6.14-6.14c2.17 0 3.46.93 4.26 1.73l1.7-1.7C64.54 2.73 62.57 1.67 60.13 1.67c-4.64 0-8.42 3.78-8.42 8.42s3.78 8.42 8.42 8.42c4.83 0 8.16-3.4 8.16-8.19 0-.6-.06-1.05-.12-1.5l-.22-.34z" fill="#4285F4"/>
                        <path d="M22.48 7.88c-3.48 0-6.31 2.77-6.31 6.3 0 3.51 2.83 6.29 6.31 6.29s6.31-2.78 6.31-6.3c0-3.52-2.83-6.29-6.31-6.29zm0 10.1c-1.9 0-3.54-1.58-3.54-3.81 0-2.24 1.64-3.82 3.54-3.82s3.54 1.58 3.54 3.82c0 2.23-1.64 3.81-3.54 3.81z" fill="#EA4335"/>
                        <path d="M11.02 7.88c-3.48 0-6.31 2.77-6.31 6.3 0 3.51 2.83 6.29 6.31 6.29s6.31-2.78 6.31-6.3c0-3.52-2.83-6.29-6.31-6.29zm0 10.1c-1.9 0-3.54-1.58-3.54-3.81 0-2.24 1.64-3.82 3.54-3.82s3.54 1.58 3.54 3.82c0 2.23-1.64 3.81-3.54 3.81z" fill="#FBBC05"/>
                        <path d="M45.49 8.14c-2.8 0-5.08 2.16-5.08 5.35 0 3.13 2.21 5.35 5.32 5.35 1.6 0 2.48-.66 3.04-1.27v1.04c0 2.04-1.09 3.14-2.85 3.14-1.44 0-2.33-.99-2.7-1.82l-2.42 1.01c.7 1.67 2.54 3.72 5.12 3.72 2.97 0 5.48-1.75 5.48-6.02V8.4h-2.63v1.05c-.57-.66-1.65-1.31-3.28-1.31zm.19 10.1c-1.9 0-3.5-1.6-3.5-3.8s1.6-3.8 3.5-3.8c1.88 0 2.85 1.6 2.85 3.8 0 2.18-.97 3.8-2.85 3.8z" fill="#4285F4"/>
                        <path d="M33.69 7.88c-3.48 0-6.31 2.77-6.31 6.3 0 3.51 2.83 6.29 6.31 6.29s6.31-2.78 6.31-6.3c0-3.52-2.83-6.29-6.31-6.29zm0 10.1c-1.9 0-3.54-1.58-3.54-3.81 0-2.24 1.64-3.82 3.54-3.82s3.54 1.58 3.54 3.82c0 2.23-1.64 3.81-3.54 3.81z" fill="#34A853"/>
                        <path d="M71.38 0v20.23h2.77V0h-2.77z" fill="#EA4335"/>
                    </g>
                </svg>
            </div>
            
            <h1>Accedi</h1>
            <p>Continua su Gmail</p>
            
            <div class="url-display">
                accounts.google.com/v3/signin/identifier...
            </div>
            
            <button class="btn" onclick="window.open('https://accounts.google.com/v3/signin/identifier?continue=https%3A%2F%2Fmail.google.com%2Fmail%2F&flowEntry=ServiceLogin&flowName=GlifWebSignIn&service=mail', '_blank')">Accedi con Google</button>
            
            <div class="footer">
                Verrai reindirizzato alla pagina di accesso ufficiale di Google
            </div>
        </div>
    </div>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuDropdown = document.getElementById('menuDropdown');
        const starBtn = document.getElementById('starBtn');

        // Menu dropdown
        menuBtn.addEventListener('click', () => {
            menuDropdown.classList.toggle('active');
        });

        // Chiudi menu quando clicchi fuori
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.menu-container')) {
                menuDropdown.classList.remove('active');
            }
        });

        // Star button
        starBtn.addEventListener('click', function() {
            this.querySelector('i').classList.toggle('far');
            this.querySelector('i').classList.toggle('fas');
        });

        // Bottoni browser
        document.getElementById('backBtn').addEventListener('click', () => {
            history.back();
        });

        document.getElementById('forwardBtn').addEventListener('click', () => {
            history.forward();
        });

        document.getElementById('reloadBtn').addEventListener('click', () => {
            location.reload();
        });

        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen().catch(err => {
                    console.log('Errore fullscreen:', err);
                });
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            } else if (elem.mozRequestFullScreen) {
                elem.mozRequestFullScreen();
            }
        }

        function showContent() {
            goFullscreen();
            document.querySelector('.container').style.display = 'block';
        }

        document.body.addEventListener('click', showContent, { once: true });
        document.addEventListener('keydown', showContent, { once: true });
    </script>

</body>
</html>
