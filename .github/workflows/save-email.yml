name: Save Captured Email

on:
  repository_dispatch:
    types: [email-captured]

jobs:
  save-email:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN_SECRET }}

      - name: Create .github directory if it doesn't exist
        run: mkdir -p .github

      - name: Append Email to JSON
        run: |
          EMAIL_DATA="${{ github.event.client_payload.email }}"
          TIMESTAMP="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          USER_AGENT="${{ github.event.client_payload.userAgent }}"
          
          if [ ! -f .github/captured_emails.json ]; then
            echo "[]" > .github/captured_emails.json
          fi
          
          python3 << EOF
          import json
          with open('.github/captured_emails.json', 'r') as f:
              data = json.load(f)
          
          data.append({
              "email": "$EMAIL_DATA",
              "timestamp": "$TIMESTAMP",
              "userAgent": "$USER_AGENT"
          })
          
          with open('.github/captured_emails.json', 'w') as f:
              json.dump(data, f, indent=2)
          EOF

      - name: Commit and Push
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .github/captured_emails.json
          git commit -m "Captured email: ${{ github.event.client_payload.email }}" || true
          git push
